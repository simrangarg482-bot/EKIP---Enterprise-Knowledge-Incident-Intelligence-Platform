# EKIP - Alembic configuration
#
# Owned by: database/ (ARCHITECTURE.md section 3), but lives at the project
# root per Alembic convention -- the `alembic` CLI looks for this file in the
# current working directory by default.
#
# sqlalchemy.url below is a placeholder only. The real connection string is
# always Settings.database_url, applied at runtime by env.py's
# config.set_main_option(...) call -- this keeps a single source of truth
# instead of the connection string being duplicated (and able to drift)
# between this file and settings.py.

[alembic]
script_location = app/database/migrations
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = placeholder://overridden-at-runtime-by-env-py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S